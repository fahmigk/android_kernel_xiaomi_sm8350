name: KingFxhmi NetHunter Kernel Build Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison libncurses-dev git perl cpio zip unzip

    - name: Sync Toolchains
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        git clone --depth=1 https://github.com/mvaisakh/gcc-arm64.git gcc64
        git clone --depth=1 https://github.com/mvaisakh/gcc-arm.git gcc32
        git clone --depth=1 https://gitlab.com/ZyCromerZ/Clang/clang-llvm.git -b 14 clang

    - name: Compile Kernel Tree
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/gcc64/bin:$GITHUB_WORKSPACE/toolchain/gcc32/bin:$PATH"
        
        # Configure variables for compilation
        make -j$(nproc --all) O=out ARCH=arm64 vili_defconfig
        
        # 1. Inject KernelSU Next & SUSFS Config Flags Hooks
        echo "CONFIG_KSU=y" >> out/.config
        echo "CONFIG_KSU_NEXT=y" >> out/.config
        echo "CONFIG_OVERLAY_FS=y" >> out/.config
        
        # 2. Anti-Bootloop Module Isolation Guard Blocks
        echo "CONFIG_MODULES=y" >> out/.config
        echo "CONFIG_MODULE_UNLOAD=y" >> out/.config
        echo "CONFIG_MODVERSIONS=y" >> out/.config
        echo "CONFIG_RANDOMIZE_BASE=n" >> out/.config
        
        # 3. Activate Atheros AR9271 & Realtek Driver Modules
        echo "CONFIG_ATH_COMMON=y" >> out/.config
        echo "CONFIG_ATH9K_HTC=y" >> out/.config
        echo "CONFIG_RTL8812AU=y" >> out/.config
        
        # Compile the final kernel binary and modules
        make -j$(nproc --all) O=out CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Package AnyKernel3 Flashable ZIP
      run: |
        # Download clean official AnyKernel3 base structure
        git clone https://github.com/osm0sis/AnyKernel3.git $GITHUB_WORKSPACE/AnyKernel3
        
        # Copy newly compiled core kernel binary
        cp out/arch/arm64/boot/Image $GITHUB_WORKSPACE/AnyKernel3/
        
        # Automatically scan, isolate, and copy out-of-tree network module drivers
        find out/ -name "*.ko" -exec cp {} $GITHUB_WORKSPACE/AnyKernel3/modules/ \;
        
        # Setup modern dynamic installer parameters inside anykernel.sh
        cd $GITHUB_WORKSPACE/AnyKernel3
        sed -i 's/kernel.string=.*/kernel.string=KingFxhmi NetHunter Kernel/' anykernel.sh
        sed -i 's/do.systemless=1/do.systemless=0/' anykernel.sh
        sed -i 's/supported.versions=.*/supported.versions=/' anykernel.sh
        
        # Compress everything clean into a standalone recovery package
        zip -r9 ../KingFxhmi-NetHunter-Kernel.zip *

    - name: Upload Flashable Kernel ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KingFxhmi-NetHunter-Kernel-vili
        path: KingFxhmi-NetHunter-Kernel.zip
