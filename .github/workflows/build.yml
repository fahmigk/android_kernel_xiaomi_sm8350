name: Build Mi 11T Pro Kernel with KSU Next
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Setup Clang Toolchain
        uses: KyleKun/arm-gnu-toolchain@main
        with:
          toolchain: clang

      - name: Integrate KernelSU Next v3.2.0 (Legacy Non-GKI Method)
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Build Kernel Image
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          make O=out vili_defconfig
          make -j$(nproc --all) O=out CC=clang

      - name: Upload Compiled Flashable Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Next-Kernel-vili
          path: out/arch/arm64/boot/Image
