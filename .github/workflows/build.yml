name: Build Mi 11T Pro Kernel with KSU Next
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git libssl-dev rsync zip libelf-dev

      - name: Clone LineageOS AOSP Clang Toolchain
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git clang

      - name: Integrate KernelSU Next v3.2.0 (Legacy Non-GKI Method)
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Build Kernel Image
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_HOST=GitHub-Actions
          export KBUILD_BUILD_USER=vili
          
          # Run defconfig configuration using LLVM mapping flags
          make O=out vili_defconfig CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Compile kernel tree
          make -j$(nproc --all) O=out CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Upload Compiled Flashable Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Next-Kernel-vili
          path: out/arch/arm64/boot/Image
