name: Build Mi 11T Pro Kernel with KSU Next
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git libssl-dev rsync zip libelf-dev

      - name: Download Reliable AOSP Clang Toolchain
        run: |
          mkdir clang
          cd clang
          wget https://github.com/Eva-Gleb/aosp-clang/releases/download/r416183b/clang-r416183b.tar.gz
          tar -zxf clang-r416183b.tar.gz

      - name: Integrate KernelSU Next v3.2.0 (Legacy Non-GKI Method)
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Build Kernel Image
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          make O=out vili_defconfig CC=clang
          make -j$(nproc --all) O=out CC=clang

      - name: Upload Compiled Flashable Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Next-Kernel-vili
          path: out/arch/arm64/boot/Image
