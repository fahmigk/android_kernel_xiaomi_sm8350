name: Build Mi 11T Pro Kernel with KSU Next
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git gnupg gperf libssl-dev libxml2-utils rsync zip

      - name: Download Google Clang Toolchain
        run: |
          mkdir clang
          cd clang
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r416183b.tar.gz
          tar -zxf clang-r416183b.tar.gz

      - name: Integrate KernelSU Next v3.2.0 (Legacy Non-GKI Method)
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Build Kernel Image
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          make O=out vili_defconfig
          make -j$(nproc --all) O=out CC=clang

      - name: Upload Compiled Flashable Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Next-Kernel-vili
          path: out/arch/arm64/boot/Image
